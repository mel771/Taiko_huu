<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web 太鼓の達人風 - ジャンル・曲選択対応版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            overflow: hidden;
            background-color: #111;
            font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            user-select: none;
        }
        
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #111;
        }

        .screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            z-index: 10;
        }
        
        .hidden { display: none !important; }

        .screen-ui {
            background: linear-gradient(135deg, #0d1b2a 0%, #1b263b 50%, #415a77 100%);
        }

        .screen-title {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 40px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .flash-text {
            font-size: 2rem;
            animation: blink 1s infinite;
            color: #fff;
            font-weight: bold;
            text-shadow: 0 0 15px #ffaa00;
            cursor: pointer;
            background: rgba(0,0,0,0.6);
            padding: 20px 50px;
            border-radius: 50px;
            border: 3px solid #ffaa00;
        }

        .menu-card {
            width: 160px;
            height: 220px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: 900;
            font-size: 1.3rem;
            text-align: center;
            border: 4px solid #fff;
            cursor: pointer;
            color: #fff;
            margin: 15px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
            transition: all 0.2s;
        }

        .menu-card:hover,
        .menu-card.active {
            transform: scale(1.08);
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
        }

        .menu-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 90vw;
        }

        .back-button {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: rgba(100,100,100,0.8);
            border: 2px solid #fff;
            color: #fff;
            cursor: pointer;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
        }

        .back-button:hover {
            background: rgba(150,150,150,0.8);
        }

        @keyframes blink {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<!-- タイトル画面 -->
<div id="screen-title" class="screen screen-title">
    <div class="flash-text" id="btn-start">ドン！と叩くかクリック</div>
</div>

<!-- ジャンル選択画面 -->
<div id="screen-genre" class="screen screen-ui hidden">
    <button class="back-button" id="back-from-genre">戻る</button>
    <h1>ジャンルを えらぶドン！</h1>
    <div class="menu-container" id="genre-list">
        <div class="menu-card" data-genre="jpop" style="background: linear-gradient(180deg, #ff79c6, #e056fd);">J-POP</div>
        <div class="menu-card" data-genre="anime" style="background: linear-gradient(180deg, #ffb86c, #f0932b);">アニメ</div>
        <div class="menu-card" data-genre="vocaloid" style="background: linear-gradient(180deg, #62ffd2, #00c292);">ボーカロイド</div>
        <div class="menu-card" data-genre="variety" style="background: linear-gradient(180deg, #8be9fd, #22a6b3);">バラエティ</div>
        <div class="menu-card" data-genre="classic" style="background: linear-gradient(180deg, #f1fa8c, #be2edd);">クラシック</div>
        <div class="menu-card" data-genre="game" style="background: linear-gradient(180deg, #50fa7b, #6ab04c);">ゲーム</div>
    </div>
</div>

<!-- 曲選択画面 -->
<div id="screen-song" class="screen screen-ui hidden">
    <button class="back-button" id="back-from-song">戻る</button>
    <h1 id="song-genre-title">ボーカロイド</h1>
    <div class="menu-container" id="song-list">
        <!-- 曲リストはJavaScriptで動的に生成 -->
    </div>
</div>

<!-- ゲーム画面 -->
<div id="screen-game" class="screen hidden"></div>

<script>
    // ========== 初期化 ==========
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // キャンバスサイズ設定
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // ========== ゲーム状態 ==========
    let gameState = 'title';
    let gameTime = 0;
    let lastTime = 0;
    let keys = { donL: 'f', donR: 'j', kaL: 'd', kaR: 'k' };
    let currentGenre = '';

    // ジャンルごとの曲リスト
    const songsByGenre = {
        jpop: [
            { name: '愛する君へ', level: 5 },
            { name: '星のかけら', level: 6 },
            { name: '夢色デイズ', level: 7 }
        ],
        anime: [
            { name: '紅蓮華', level: 6 },
            { name: '炎', level: 7 },
            { name: 'グッバイ宣言', level: 8 }
        ],
        vocaloid: [
            { name: 'ヒバナ', level: 8 },
            { name: 'ロキ', level: 7 },
            { name: 'ワールドイズマイン', level: 6 }
        ],
        variety: [
            { name: 'ドラえもん', level: 3 },
            { name: 'アンパンマン', level: 4 },
            { name: 'サザエさん', level: 3 }
        ],
        classic: [
            { name: 'モーツァルト - アイネクライネ', level: 5 },
            { name: 'ベートーヴェン - 第9', level: 7 },
            { name: 'チャイコフスキー - くるみ割り人形', level: 6 }
        ],
        game: [
            { name: 'スーパーマリオ ステージ1', level: 4 },
            { name: 'ゼルダの伝説 メインテーマ', level: 5 },
            { name: 'ポケモン セント・アンス号', level: 6 }
        ]
    };

    const genreNames = {
        jpop: 'J-POP',
        anime: 'アニメ',
        vocaloid: 'ボーカロイド',
        variety: 'バラエティ',
        classic: 'クラシック',
        game: 'ゲーム'
    };

    // ========== 画面切り替え ==========
    function showScreen(screenName) {
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        const screen = document.getElementById(`screen-${screenName}`);
        if (screen) {
            screen.classList.remove('hidden');
        }
        gameState = screenName;
    }

    // ========== イベントリスナー ==========
    document.getElementById('btn-start').addEventListener('click', () => {
        showScreen('genre');
    });

    document.getElementById('back-from-genre').addEventListener('click', () => {
        showScreen('title');
    });

    document.getElementById('back-from-song').addEventListener('click', () => {
        showScreen('genre');
    });

    document.getElementById('genre-list').addEventListener('click', (e) => {
        const card = e.target.closest('.menu-card');
        if (card) {
            currentGenre = card.getAttribute('data-genre');
            loadSongList(currentGenre);
            showScreen('song');
        }
    });

    document.getElementById('song-list').addEventListener('click', (e) => {
        const card = e.target.closest('.menu-card');
        if (card) {
            const songName = card.getAttribute('data-song');
            console.log(`選択曲: ${songName}`);
            startGame(songName);
        }
    });

    window.addEventListener('keydown', (e) => {
        const key = e.key.toLowerCase();
        
        if (gameState === 'title') {
            if (key === keys.donL || key === keys.donR || key === keys.kaL || key === keys.kaR) {
                showScreen('genre');
            }
        }
    });

    // ========== 曲リストを読み込み ==========
    function loadSongList(genre) {
        const songList = document.getElementById('song-list');
        songList.innerHTML = '';

        document.getElementById('song-genre-title').textContent = genreNames[genre] || genre;

        const songs = songsByGenre[genre] || [];
        songs.forEach(song => {
            const card = document.createElement('div');
            card.className = 'menu-card';
            card.setAttribute('data-song', song.name);
            card.style.background = 'linear-gradient(180deg, #ff9800, #f57c00)';
            card.innerHTML = `
                <div>${song.name}</div>
                <div style="font-size: 0.8rem; margin-top: 10px;">★${song.level}</div>
            `;
            songList.appendChild(card);
        });
    }

    // ========== ゲーム開始 ==========
    function startGame(songName) {
        showScreen('game');
        gameTime = 0;
        lastTime = performance.now();
        console.log(`ゲーム開始: ${songName}`);
        gameLoop();
    }

    // ========== メインゲームループ ==========
    function gameLoop() {
        requestAnimationFrame(gameLoop);

        const now = performance.now();
        const deltaTime = lastTime ? now - lastTime : 0;
        lastTime = now;

        if (gameState === 'game') {
            gameTime += deltaTime;
            drawGameScreen();
        } else if (gameState === 'title') {
            drawTitleScreen();
        }
    }

    // ========== 描画関数 ==========
    function drawTitleScreen() {
        // タイトル背景グラデーション
        const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
        grad.addColorStop(0, '#1a1a2e');
        grad.addColorStop(1, '#16213e');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // タイトルテキスト
        ctx.fillStyle = '#ffaa00';
        ctx.font = 'bold 60px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('太鼓の達人', canvas.width / 2, canvas.height / 2 - 100);

        // 点滅テキスト
        const blink = Math.sin(gameTime / 500) * 0.5 + 0.5;
        ctx.globalAlpha = blink;
        ctx.fillStyle = '#ffff00';
        ctx.font = 'bold 30px sans-serif';
        ctx.fillText('キーを押してスタート', canvas.width / 2, canvas.height / 2 + 50);
        ctx.globalAlpha = 1;
    }

    function drawGameScreen() {
        // ゲーム画面の背景
        const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
        grad.addColorStop(0, '#0d1b2a');
        grad.addColorStop(1, '#1a3a52');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const laneY = canvas.height / 2;
        const laneHeight = 150;
        const hitX = canvas.width * 0.15;

        // ゲームレーン
        ctx.fillStyle = 'rgba(25, 25, 35, 0.8)';
        ctx.fillRect(0, laneY - laneHeight / 2, canvas.width, laneHeight);

        // レーンボーダー
        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, laneY - laneHeight / 2);
        ctx.lineTo(canvas.width, laneY - laneHeight / 2);
        ctx.moveTo(0, laneY + laneHeight / 2);
        ctx.lineTo(canvas.width, laneY + laneHeight / 2);
        ctx.stroke();

        // ヒットサークル - 負の値チェック
        const radius = Math.max(1, 50);
        if (hitX > 0 && laneY > 0 && radius > 0) {
            ctx.beginPath();
            ctx.arc(hitX, laneY, radius, 0, Math.PI * 2);
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 4;
            ctx.stroke();
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.fill();
        }

        // テキスト表示
        ctx.fillStyle = '#00ffcc';
        ctx.font = 'bold 24px sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText(`ゲーム時間: ${Math.floor(gameTime)}ms`, 20, 40);
    }

    // ========== ゲーム開始 ==========
    gameLoop();
</script>

</body>
</html>
